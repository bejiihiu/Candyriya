name: Auto Merge to Main

on:
  push:
    branches:
      - 'v*'

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if ci ignore
        id: skip
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          if echo "$COMMIT_MSG" | grep -q '\[ci ignore\]'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.skip.outputs.skip != 'true'
        uses: gh-action-create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: auto-merge-${{ github.sha }}
          base: main
          title: "Merge to main"
          body: |
            Auto-merge from `${{ github.ref_name }}` branch.
            Commit: ${{ github.sha }}
            Commit message: ${{ github.event.head_commit.message }}
          commit-message: "chore: merge from ${{ github.ref_name }}"
          delete-branch: true

      - name: Auto approve
        if: steps.skip.outputs.skip != 'true'
        run: |
          PR_NUMBER=$(gh pr list --head auto-merge-${{ github.sha }} --json number -q '.[0].number')
          if [ -n "$PR_NUMBER" ]; then
            gh pr review $PR_NUMBER --approve
            gh pr merge $PR_NUMBER --auto --squash
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
