name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew cleanBuild build collect --no-daemon
    
    - name: Get tag name
      id: get_tag
      run: echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
    
    - name: Determine release type
      id: release_type
      run: |
        TAG="${{ steps.get_tag.outputs.TAG_NAME }}"
        if [[ $TAG == *"beta"* ]]; then
          echo "TYPE=beta" >> $GITHUB_OUTPUT
        elif [[ $TAG == *"unstable"* ]]; then
          echo "TYPE=unstable" >> $GITHUB_OUTPUT
        elif [[ $TAG == *"release"* ]]; then
          echo "TYPE=release" >> $GITHUB_OUTPUT
        else
          echo "TYPE=release" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.get_tag.outputs.TAG_NAME }}
        name: Candyriya ${{ steps.get_tag.outputs.TAG_NAME }}
        draft: false
        prerelease: ${{ steps.release_type.outputs.TYPE != 'release' }}
        files: |
          build/libs/*.jar
        body: |
          ## Candyriya ${{ steps.get_tag.outputs.TAG_NAME }}
          
          Release type: ${{ steps.release_type.outputs.TYPE }}
          
          ### Supported Platforms
          - Forge
          - NeoForge
          - Fabric
          
          ### Minecraft Version
          - 1.21.1
          
          ---
          Original project by [IzzelAliz](https://github.com/IzzelAliz/Arclight)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
