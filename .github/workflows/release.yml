name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Cache Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Build with Gradle
      run: ./gradlew cleanBuild build collect --no-daemon
    
    - name: Get build ID
      id: get_build_id
      run: |
        BUILD_ID=$(git rev-list --count HEAD)
        echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
        echo "SHORT_SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: build-${{ steps.get_build_id.outputs.BUILD_ID }}
        name: Build #${{ steps.get_build_id.outputs.BUILD_ID }}
        draft: false
        prerelease: false
        files: |
          build/libs/*.jar
        body: |
          ## Build #${{ steps.get_build_id.outputs.BUILD_ID }}
          
          **Commit:** ${{ github.sha }}
          **Short SHA:** ${{ steps.get_build_id.outputs.SHORT_SHA }}
          
          ### Supported Platforms
          - Forge
          - NeoForge
          - Fabric
          
          ### Minecraft Version
          - 1.21.1
          
          ---
          Original project by [IzzelAliz](https://github.com/IzzelAliz/Arclight)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
