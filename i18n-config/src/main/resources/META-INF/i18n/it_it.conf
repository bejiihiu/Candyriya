    ]
  }
  async-catcher.comment = [
    "Impostazioni relative ad Async Catcher"
    "Ci sono quattro modalità, ed è raccomandata BLOCK"
    "NONE - Non fare nulla"
    "DISPATCH - Invia l’azione al thread principale senza bloccare"
    "BLOCK - Esegui nel thread principale e attendi i risultati"
    "EXCEPTION - Genera un errore"
  ]
  async-catcher.dump.comment = "Salva le informazioni dello stack trace in debug.log"
