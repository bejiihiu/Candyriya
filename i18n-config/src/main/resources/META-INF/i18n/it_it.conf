    symlink-world.comment = [
      "Crea collegamenti simbolici alla cartella delle dimensioni delle mod che corrisponde al nome del mondo Bukki"
      "Abilitare questa opzione può migliorare la compatibilità con i plugin"
      "Modificare questa impostazione su un server in produzione causerà cambiamenti ai nomi dei mondi delle mod"
      "  e provocherà perdita di dati nei plugin che si basano sui nomi dei mondi"
      "Consultare https://github.com/IzzelAliz/Arclight/wiki/World-Symlink per maggiori dettagli"
    ]
    extra-logic-worlds.comment = [
      "Logica di esecuzione dei mondi extra"
      "Se alcune mod non funzionano correttamente, prova a cercare nei log i nomi delle classi relativi a [EXT_LOGIC] e aggiungili qui"
    ]
    forward-permission.comment = [
      "true - Inoltra la richiesta di permesso di Forge a Bukkit"
      "false - Disabilita l'inoltro dei permessi"
      "reverse - Inoltra la richiesta di permesso del giocatore Bukkit a Forge"
    ]
    valid-username-regex.comment = [
      "Espressione regolare per la verifica dei nomi utente validi. Lasciarla vuota utilizzerà la verifica standard di vanilla"
      "La seguente permette caratteri cinesi:"
      "valid-username-regex = \"^[ -~\\\\p{sc=Han}]{1,16}$\""
      "La seguente permette a qualsiasi nome utente di effettuare il login:"
      "valid-username-regex = \".+\""
    ]
    #exact-plugin-entity-damage-control.comment = [
    #  "Lascia che il plugin o la mod controllino il danno finale all'entità"
    #  "Quando impostato su true, il danno aggiunto dalle mod potrebbe essere sovrascritto dai plugin"
    #]
    isolate-plugin-class-loaders.comment = [
      "Un accesso illegale significa che un plugin carica una classe da un altro plugin che non è una sua dipendenza o dipendenza soft"
      "Quando viene fornito un nome di pacchetto, non verranno tentati accessi illegali alle classi con prefisso uguale al nome del pacchetto."
      "Questo è particolarmente utile quando si verificano problemi di caricamento delle classi."
      "Attenzione: potrebbe causare malfunzionamenti nei plugin che si basano su accessi illegali."
    ]
    isolate-adventure-from-modloader.comment = [
      "Impedisci ai plugin di caricare Kyori Adventure da ModLoader."
      "Questa è solo un’opzione di compatibilità e resterà per ora. Verrà sostituita con un meccanismo migliore."
    ]
  }
