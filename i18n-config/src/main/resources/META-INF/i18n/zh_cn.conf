    enable.comment = [
      "启用 Velocity 的玩家信息转发支持"
    ]
    secret.comment = [
      "Velocity 玩家信息转发使用的密钥"
    ]
  }
  experimental {
    comment = [
      "这些实验性设置可能可以提高兼容性或功能性。"
      "如果你决定使用这些设置，请汇报任何你遇到的问题。"
    ]
    replaceable-base-world-generator.comment = [
      "此设置设计来提供TerraBlender的多世界支持。"
      "然而他也可以用于为多世界支持添加更多可用世界。"
      "不建议创建mod特定的维度。这种情况可能不受支持。"
      "Bukkit中，区块生成器可以可选的依赖于原版生成器的结果，"
      "而生物群系提供器会完全覆盖群系提供。"
      "如果你想要使用已加载的世界生成配置(LevelStem)，"
      "为对应世界使用CUSTOM环境，会令Arclight为此世界使用'bukkit:<世界名>'的生成配置。"
      "此世界生成配置可以由数据包提供的。"
      "设置后，来自原世界中的世界生成配置信息会被忽略。"
      "这也会忽略WorldType设置。就是可以通过mv create的-t设置的那个。"
      "这些应当均可以在数据包中指定。"
      "为一个已生成的世界配置此设置可能会导致世界生成撕裂。"
    ]
  }
